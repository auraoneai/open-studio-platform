repository:
  name: rubric-studio-open
  description: "Local-first IDE for authoring, testing, calibrating, diffing, and exporting AI evaluation rubrics."
  homepage: https://auraone.ai/open/rubric-studio-open
  private: false
  has_issues: true
  has_projects: false
  has_wiki: false
  has_discussions: true
  delete_branch_on_merge: true
  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: true
  enable_automated_security_fixes: true
  enable_vulnerability_alerts: true
  topics:
    - ai
    - eval
    - evals
    - evaluation
    - ide
    - llm
    - local-first
    - rubric

branches:
  - name: main
    protection:
      required_status_checks:
        strict: true
        contexts:
          - DCO / Signed-off-by trailers
          - Rubric Studio Open Release / Release Ops Gate
          - Rubric Studio Open Release / Security, SBOM, License
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
      enforce_admins: true
      required_linear_history: true
      restrictions: null
