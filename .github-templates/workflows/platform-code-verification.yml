name: Open Studio Platform Code Verification

on:
  workflow_call:
    inputs:
      macos_runs_on:
        description: 'Optional JSON runner labels for macOS jobs, for example ["self-hosted","macOS","auraone-platform"].'
        required: false
        type: string
      windows_runs_on:
        description: 'Optional JSON runner labels for Windows jobs, for example ["self-hosted","Windows","auraone-platform"].'
        required: false
        type: string
      linux_runs_on:
        description: 'Optional JSON runner labels for Linux jobs, for example ["self-hosted","Linux","auraone-platform"].'
        required: false
        type: string
      macos_gpu_runs_on:
        description: 'Optional JSON runner labels for macOS GPU fixture jobs.'
        required: false
        type: string
      windows_gpu_runs_on:
        description: 'Optional JSON runner labels for Windows GPU fixture jobs.'
        required: false
        type: string
      linux_gpu_runs_on:
        description: 'Optional JSON runner labels for Linux GPU fixture jobs.'
        required: false
        type: string
  workflow_dispatch:
    inputs:
      macos_runs_on:
        description: 'Optional JSON runner labels for macOS jobs, for example ["self-hosted","macOS","auraone-platform"].'
        required: false
        type: string
      windows_runs_on:
        description: 'Optional JSON runner labels for Windows jobs, for example ["self-hosted","Windows","auraone-platform"].'
        required: false
        type: string
      linux_runs_on:
        description: 'Optional JSON runner labels for Linux jobs, for example ["self-hosted","Linux","auraone-platform"].'
        required: false
        type: string
      macos_gpu_runs_on:
        description: 'Optional JSON runner labels for macOS GPU fixture jobs.'
        required: false
        type: string
      windows_gpu_runs_on:
        description: 'Optional JSON runner labels for Windows GPU fixture jobs.'
        required: false
        type: string
      linux_gpu_runs_on:
        description: 'Optional JSON runner labels for Linux GPU fixture jobs.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  tauri-template-matrix:
    name: Tauri template verification (${{ matrix.os }})
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            runs_on: ${{ inputs.macos_runs_on || vars.AURAONE_PLATFORM_MACOS_RUNS_ON || '["macos-14"]' }}
          - os: windows-latest
            runs_on: ${{ inputs.windows_runs_on || vars.AURAONE_PLATFORM_WINDOWS_RUNS_ON || '["windows-latest"]' }}
          - os: ubuntu-24.04
            runs_on: ${{ inputs.linux_runs_on || vars.AURAONE_PLATFORM_LINUX_RUNS_ON || '["ubuntu-24.04"]' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux WebKit dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.5"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.0
      - uses: dtolnay/rust-toolchain@stable
      - name: Install platform dependencies
        run: pnpm --dir opensource/open-studio-platform install --frozen-lockfile
      - name: Verify Tauri shell template
        run: pnpm --dir opensource/open-studio-platform/templates/tauri-app run verify

  native-keychain-smoke:
    name: Native keychain smoke (${{ matrix.os }})
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            runs_on: ${{ inputs.macos_runs_on || vars.AURAONE_PLATFORM_MACOS_RUNS_ON || '["macos-14"]' }}
          - os: windows-latest
            runs_on: ${{ inputs.windows_runs_on || vars.AURAONE_PLATFORM_WINDOWS_RUNS_ON || '["windows-latest"]' }}
          - os: ubuntu-24.04
            runs_on: ${{ inputs.linux_runs_on || vars.AURAONE_PLATFORM_LINUX_RUNS_ON || '["ubuntu-24.04"]' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run current-OS native keychain smoke test
        env:
          AURAONE_RUN_NATIVE_KEYCHAIN_SMOKE: "1"
        run: cargo test --manifest-path opensource/open-studio-platform/Cargo.toml -p auraone-platform-keychain native_backend_round_trip_on_current_os -- --ignored --exact --nocapture

  gpu-decode-fixtures:
    name: GPU decode fixture contract (${{ matrix.backend }})
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            backend: videotoolbox
            runs_on: ${{ inputs.macos_gpu_runs_on || vars.AURAONE_PLATFORM_MACOS_GPU_RUNS_ON || inputs.macos_runs_on || vars.AURAONE_PLATFORM_MACOS_RUNS_ON || '["macos-14"]' }}
          - os: ubuntu-24.04
            backend: vaapi
            runs_on: ${{ inputs.linux_gpu_runs_on || vars.AURAONE_PLATFORM_LINUX_GPU_RUNS_ON || inputs.linux_runs_on || vars.AURAONE_PLATFORM_LINUX_RUNS_ON || '["ubuntu-24.04"]' }}
          - os: windows-latest
            backend: direct3d11
            runs_on: ${{ inputs.windows_gpu_runs_on || vars.AURAONE_PLATFORM_WINDOWS_GPU_RUNS_ON || inputs.windows_runs_on || vars.AURAONE_PLATFORM_WINDOWS_RUNS_ON || '["windows-latest"]' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run backend mapping tests
        run: cargo test --manifest-path opensource/open-studio-platform/Cargo.toml -p auraone-platform-video
      - name: Run hardware fixture smoke when fixture is mounted
        if: vars.AURAONE_GPU_FIXTURE != ''
        env:
          AURAONE_RUN_GPU_DECODE_SMOKE: "1"
          AURAONE_GPU_BACKEND: ${{ matrix.backend }}
          AURAONE_GPU_FIXTURE: ${{ vars.AURAONE_GPU_FIXTURE }}
        run: cargo test --manifest-path opensource/open-studio-platform/Cargo.toml -p auraone-platform-video gpu_decode_fixture_contract -- --ignored --exact --nocapture
      - name: Record missing hardware fixture
        if: vars.AURAONE_GPU_FIXTURE == ''
        run: echo "AURAONE_GPU_FIXTURE is not configured; hardware decode smoke remains a runner/artifact blocker."

  release-flow-contracts:
    name: Offline/crash/telemetry/intake release-flow contracts
    runs-on: ${{ fromJSON(inputs.linux_runs_on || vars.AURAONE_PLATFORM_LINUX_RUNS_ON || '["ubuntu-24.04"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.19.5"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.0
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm --dir opensource/open-studio-platform install --frozen-lockfile
      - run: pnpm --dir opensource/open-studio-platform run verify:code-gates
